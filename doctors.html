<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Specialists | HealBridge</title>

<link rel="stylesheet" href="css/doctors.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/4f3d7c1f3a.js" crossorigin="anonymous"></script>

</head>
<body>

<header>

<h1>Find Specialists</h1>

<input
type="text"
id="search"
placeholder="Search psychiatrist or counsellor..."
>

</header>


<section class="doctor-container">

<div class="doctor-card">

<img src="https://i.pravatar.cc/200?img=32">

<h2>Dr. Sarah Wilson</h2>

<h4>Psychiatrist</h4>

<p>Experience: 12 Years</p>

<p>⭐ 4.9 Rating</p>

<button>Book Appointment</button>

</div>


<div class="doctor-card">

<img src="https://i.pravatar.cc/200?img=47">

<h2>Dr. Emily Brown</h2>

<h4>Counsellor</h4>

<p>Experience: 8 Years</p>

<p>⭐ 4.8 Rating</p>

<button>Book Appointment</button>

</div>


<div class="doctor-card">

<img src="https://i.pravatar.cc/200?img=12">

<h2>Dr. John Parker</h2>

<h4>Psychologist</h4>

<p>Experience: 10 Years</p>

<p>⭐ 4.7 Rating</p>

<button>Book Appointment</button>

</div>


<div class="doctor-card">

<img src="https://i.pravatar.cc/200?img=54">

<h2>Dr. Lisa Green</h2>

<h4>Family Counsellor</h4>

<p>Experience: 6 Years</p>

<p>⭐ 4.9 Rating</p>

<button>Book Appointment</button>

</div>

</section>

<script src="js/doctors.js"></script>

</body>
</html>
